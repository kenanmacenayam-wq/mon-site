<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon premier site</title>

    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <p>Mon premier site avec Cloudflare Pages.</p>

    <button onclick="changerTexte()">

    <script>
        function changerTexte() {
            document.querySelector("p").innerText =
                "Le JavaScript fonctionne !";
        }
    </script>

</body>
</html>
